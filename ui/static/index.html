<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>ComfyUI OpenClaw Skill UI</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel Standalone for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background-color: #090b0f;
    }
  </style>
</head>

<body class="text-white min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [config, setConfig] = useState({ comfyui_server_url: '', output_dir: '' });
      const [workflows, setWorkflows] = useState([]);

      const [uploadedData, setUploadedData] = useState(null);
      const [wfId, setWfId] = useState('');
      const [wfDesc, setWfDesc] = useState('');
      const [schemaParams, setSchemaParams] = useState({});

      // To auto-render lucide icons after React mounts/updates
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });

      useEffect(() => {
        fetchConfig();
        fetchWorkflows();
      }, []);

      const fetchConfig = async () => {
        try {
          const res = await fetch('/api/config');
          const data = await res.json();
          setConfig(data);
        } catch (e) { console.error('Failed to load config', e); }
      };

      const fetchWorkflows = async () => {
        try {
          const res = await fetch('/api/workflows');
          const data = await res.json();
          setWorkflows(data.workflows || []);
        } catch (e) { console.error('Failed to load workflows', e); }
      };

      const saveConfig = async () => {
        try {
          await fetch('/api/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(config)
          });
          alert('全局配置已保存');
        } catch (e) { alert('保存失败'); }
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const json = JSON.parse(evt.target.result);
            setUploadedData(json);

            // Auto-extract primitive fields
            const initialParams = {};
            Object.entries(json).forEach(([nodeId, nodeObj]) => {
              if (!nodeObj.inputs) return;
              Object.entries(nodeObj.inputs).forEach(([field, val]) => {
                if (!Array.isArray(val)) {
                  const paramKey = `${nodeId}_${field}`;
                  let typeGuess = 'string';
                  if (typeof val === 'number') typeGuess = Number.isInteger(val) ? 'int' : 'float';
                  else if (typeof val === 'boolean') typeGuess = 'boolean';

                  initialParams[paramKey] = {
                    exposed: false,
                    node_id: parseInt(nodeId),
                    field: field,
                    name: field,
                    type: typeGuess,
                    required: false,
                    description: '',
                    currentVal: val
                  };
                }
              });
            });
            setSchemaParams(initialParams);
          } catch (err) { alert('Invalid JSON file'); }
        };
        reader.readAsText(file);
      };

      const handleParamChange = (key, field, value) => {
        setSchemaParams(prev => ({
          ...prev,
          [key]: { ...prev[key], [field]: value }
        }));
      };

      const saveWorkflow = async () => {
        if (!wfId) return alert("请命名 Workflow ID");

        const finalSchema = {};
        for (const p of Object.values(schemaParams)) {
          if (p.exposed) {
            if (!p.name) return alert(`暴露的参数缺少 Alias 名称 (Node ${p.node_id} / ${p.field})`);
            finalSchema[p.name] = {
              node_id: p.node_id,
              field: p.field,
              required: p.required,
              type: p.type,
              description: p.description
            };
          }
        }

        try {
          const res = await fetch('/api/workflow/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              workflow_id: wfId,
              description: wfDesc,
              workflow_data: uploadedData,
              schema_params: finalSchema
            })
          });
          if (res.ok) {
            alert('保存成功！Agent 现在可以调度该工作流了。');
            setUploadedData(null);
            setWfId('');
            setWfDesc('');
            setSchemaParams({});
            fetchWorkflows();
            setTimeout(() => window.lucide.createIcons(), 100);
          }
        } catch (e) { alert('保存失败'); }
      };

      const deleteWorkflow = async (id) => {
        if (!confirm(`确定删除工作流 ${id} 吗？`)) return;
        try {
          await fetch(`/api/workflow/${id}`, { method: 'DELETE' });
          fetchWorkflows();
          setTimeout(() => window.lucide.createIcons(), 100);
        } catch (e) { alert('删除失败'); }
      };

      return (
        <div className="min-h-screen p-8 max-w-6xl mx-auto space-y-8 font-sans">
          <header className="flex items-center space-x-3 mb-12">
            <div className="p-3 bg-blue-500/10 rounded-xl">
              <i data-lucide="cpu" className="w-8 h-8 text-blue-400"></i>
            </div>
            <div>
              <h1 className="text-3xl font-bold tracking-tight text-white">ComfyUI OpenClaw Skill</h1>
              <p className="text-gray-400 mt-1">动态解析架构工作流，为 Agent 构建可视化参数映射表。</p>
            </div>
          </header>

          {/* Configurations */}
          <section className="bg-[#111318]/50 border border-gray-800 backdrop-blur-sm rounded-2xl p-6 shadow-xl">
            <div className="flex items-center space-x-2 mb-6 text-gray-200">
              <i data-lucide="settings" className="w-5 h-5 text-gray-400"></i>
              <h2 className="text-xl font-semibold">全局系统配置 (Global Config)</h2>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label className="block text-sm font-medium text-gray-400 mb-2">ComfyUI 服务器地址</label>
                <input
                  className="w-full bg-[#090b0f] border border-gray-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-mono text-sm"
                  value={config.comfyui_server_url}
                  onChange={e => setConfig({ ...config, comfyui_server_url: e.target.value })}
                  placeholder="http://127.0.0.1:8188"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-400 mb-2">图片输出存档目录</label>
                <input
                  className="w-full bg-[#090b0f] border border-gray-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all font-mono text-sm"
                  value={config.output_dir}
                  onChange={e => setConfig({ ...config, output_dir: e.target.value })}
                  placeholder="/absolute/path/to/outputs"
                />
              </div>
            </div>
            <button onClick={saveConfig} className="mt-6 flex items-center bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-lg font-medium transition-colors">
              <i data-lucide="save" className="w-4 h-4 mr-2"></i> 保存配置信息
            </button>
          </section>

          {/* Installed Workflows */}
          <section className="bg-[#111318]/50 border border-gray-800 backdrop-blur-sm rounded-2xl p-6 shadow-xl">
            <div className="flex items-center space-x-2 mb-6 text-gray-200">
              <i data-lucide="layers" className="w-5 h-5 text-green-400"></i>
              <h2 className="text-xl font-semibold">已注册的工作流 (Registry)</h2>
            </div>
            {workflows.length === 0 ? (
              <div className="text-gray-500 text-sm py-4 bg-[#090b0f] rounded-xl px-4 border border-dashed border-gray-800">当前尚未配置任何工作流映射。</div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {workflows.map(wf => (
                  <div key={wf} className="bg-[#090b0f] border border-gray-800 rounded-xl p-4 flex justify-between items-center group hover:border-gray-600 transition-colors">
                    <span className="font-medium text-gray-300 flex items-center"><span className="text-amber-400 mr-2">⚡</span> {wf}</span>
                    <button onClick={() => deleteWorkflow(wf)} className="text-gray-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all">
                      <i data-lucide="trash-2" className="w-4 h-4"></i>
                    </button>
                  </div>
                ))}
              </div>
            )}
          </section>

          {/* Upload and Map */}
          <section className="bg-[#111318]/50 border border-gray-800 backdrop-blur-sm rounded-2xl p-6 shadow-xl">
            <div className="flex items-center space-x-2 mb-6 text-gray-200">
              <i data-lucide="upload-cloud" className="w-5 h-5 text-indigo-400"></i>
              <h2 className="text-xl font-semibold">注册新工作流 (Upload & Mapping)</h2>
            </div>

            <div className="border-2 border-dashed border-gray-700 bg-[#090b0f] rounded-xl p-8 text-center hover:border-indigo-500/50 transition-colors relative cursor-pointer overflow-hidden group">
              <input type="file" accept=".json" onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
              <div className="flex flex-col items-center justify-center space-y-3 group-hover:scale-105 transition-transform duration-300">
                <div className="p-4 bg-indigo-500/10 rounded-full">
                  <i data-lucide="upload-cloud" className="w-10 h-10 text-indigo-500"></i>
                </div>
                <div>
                  <p className="text-gray-300 font-medium text-lg">拖拽或点击上传 ComfyUI workflow_api.json</p>
                  <p className="text-gray-500 text-sm mt-1">上传后可按节点对参数进行重新映射</p>
                </div>
              </div>
            </div>

            {uploadedData && (
              <div className="mt-8 space-y-6 animate-in slide-in-from-bottom-4 duration-500 fade-in">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-[#090b0f] p-6 rounded-xl border border-gray-800 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                  <div>
                    <label className="block text-sm font-medium text-gray-400 mb-2">Workflow ID (需英文字母)</label>
                    <input placeholder="e.g. sd_basic" value={wfId} onChange={e => setWfId(e.target.value)} className="w-full bg-[#111318] border border-gray-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 font-mono" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-gray-400 mb-2">功能描述 (给 Agent 阅读)</label>
                    <input placeholder="e.g. 用于生成二次元基础图片" value={wfDesc} onChange={e => setWfDesc(e.target.value)} className="w-full bg-[#111318] border border-gray-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500" />
                  </div>
                </div>

                <div className="space-y-4">
                  <h3 className="text-lg font-medium text-gray-300 border-b border-gray-800 pb-2">解析到的输入节点清单</h3>
                  {Object.entries(uploadedData).map(([nodeId, nodeObj]) => {
                    const props = Object.keys(schemaParams).filter(k => schemaParams[k].node_id === parseInt(nodeId));
                    if (props.length === 0) return null;

                    return (
                      <div key={nodeId} className="bg-[#090b0f] border border-gray-800 rounded-xl overflow-hidden shadow-sm">
                        <div className="bg-[#1a1d24] px-4 py-3 border-b border-gray-800 flex justify-between items-center">
                          <div className="flex items-center space-x-2">
                            <div className="w-2 h-2 rounded-full bg-green-500"></div>
                            <span className="font-semibold text-gray-200">{nodeObj.class_type}</span>
                          </div>
                          <span className="text-xs bg-gray-800 text-gray-300 px-2 py-1 rounded font-mono">Node ID: {nodeId}</span>
                        </div>
                        <div className="p-4 space-y-4">
                          {props.map(pKey => {
                            const p = schemaParams[pKey];
                            return (
                              <div key={pKey} className={`p-4 rounded-lg border transition-all duration-300 flex flex-col md:flex-row md:items-center gap-4 ${p.exposed ? 'border-indigo-500 bg-indigo-500/10 shadow-inner' : 'border-gray-800 bg-[#111318] hover:border-gray-700'}`}>

                                <div className="flex items-center space-x-4 min-w-[200px]">
                                  <label className="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" className="sr-only peer" checked={p.exposed} onChange={(e) => handleParamChange(pKey, 'exposed', e.target.checked)} />
                                    <div className="w-11 h-6 bg-gray-800 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                                  </label>
                                  <div>
                                    <div className={`text-sm font-medium ${p.exposed ? 'text-indigo-300' : 'text-gray-300'}`}>{p.field}</div>
                                    <div className="text-xs text-gray-500 max-w-[150px] truncate" title={String(p.currentVal)}>当前值: {String(p.currentVal)}</div>
                                  </div>
                                </div>

                                {p.exposed && (
                                  <div className="grid grid-cols-1 md:grid-cols-4 gap-4 flex-1 animate-in fade-in zoom-in-95 duration-200">
                                    <div>
                                      <label className="block text-xs text-gray-400 mb-1">暴露别名 (Alias)</label>
                                      <input value={p.name} onChange={e => handleParamChange(pKey, 'name', e.target.value)} className="w-full bg-[#090b0f] border border-gray-700 focus:border-indigo-500 rounded p-2 text-sm text-white font-mono" />
                                    </div>
                                    <div className="col-span-1 md:col-span-2">
                                      <label className="block text-xs text-gray-400 mb-1">AI 描述 (Desc)</label>
                                      <input placeholder="如: 高清风景提示词" value={p.description} onChange={e => handleParamChange(pKey, 'description', e.target.value)} className="w-full bg-[#090b0f] border border-gray-700 focus:border-indigo-500 rounded p-2 text-sm text-white" />
                                    </div>
                                    <div>
                                      <label className="block text-xs text-gray-400 mb-1">类型 (Type)</label>
                                      <select value={p.type} onChange={e => handleParamChange(pKey, 'type', e.target.value)} className="w-full bg-[#090b0f] border border-gray-700 focus:border-indigo-500 rounded p-2 text-sm text-white font-mono cursor-pointer">
                                        <option value="string">String</option>
                                        <option value="int">Integer</option>
                                        <option value="float">Float</option>
                                        <option value="boolean">Boolean</option>
                                      </select>
                                      <div className="mt-2 text-xs flex items-center space-x-2">
                                        <input type="checkbox" id={`req_${pKey}`} checked={p.required} onChange={e => handleParamChange(pKey, 'required', e.target.checked)} className="rounded border-gray-700 text-indigo-600 focus:ring-indigo-500 cursor-pointer" />
                                        <label htmlFor={`req_${pKey}`} className="text-gray-400 cursor-pointer hover:text-gray-300">必填给大模型</label>
                                      </div>
                                    </div>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>

                <button onClick={saveWorkflow} className="w-full py-4 mt-8 bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-500 hover:to-blue-500 text-white rounded-xl font-bold text-lg shadow-lg shadow-indigo-500/25 transition-all flex items-center justify-center transform hover:-translate-y-0.5">
                  <i data-lucide="save" className="w-5 h-5 mr-3"></i> 保存此工作流及映射 Schema
                </button>
              </div>
            )}
          </section>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>

</html>
